<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon e Ícones -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="alternate icon" type="image/png" href="/icon-192.png" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Android/Chrome -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Recicloth" />

    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Recicloth" />


    <!-- Primary Meta Tags (will be overridden by react-helmet-async per page) -->
    <title>Recicloth | Moda que respeita o planeta</title>
    <meta name="title" content="Recicloth | Moda que respeita o planeta" />
    <meta name="description" content="Recicloth: loja online de roupa reciclada, upcycled e segunda-mao em Portugal. Moda sustentavel para um futuro melhor." />
    <meta name="keywords" content="moda sustentavel, roupa reciclada, upcycled, segunda-mao, recicloth, ecommerce portugal" />
    <meta name="author" content="Recicloth" />
    <meta name="language" content="Portuguese" />
    <meta name="geo.region" content="PT" />
    <meta name="geo.placename" content="Portugal" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#2D6A4F" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#2D6A4F" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1A1A1A" />

    <!-- Google tag (gtag.js) — Consent Mode v2: analytics denied by default until user accepts -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W53K7Z3L44"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        wait_for_update: 500
      });
      gtag('js', new Date());
      gtag('config', 'G-W53K7Z3L44', { send_page_view: false });
    </script>

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Load Google Fonts asynchronously (non-render-blocking) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"></noscript>

    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">

    <!-- Accessibility Widget Styling (Recicloth Theme) -->
    <style>
      /* Button positioning and color - use high specificity */
      a.asw-menu-btn {
        left: auto !important;
        right: 20px !important;
        border: 3px solid white !important;
        outline: 5px solid #24563f !important;
        background: #24563f !important;
        background: linear-gradient(96deg, #24563f, #1a3f2f) !important;
      }

      /* Menu header background */
      .asw-menu-header {
        background: linear-gradient(135deg, #24563f, #1a3f2f) !important;
      }

      /* Card titles color */
      .asw-card-title {
        color: #24563f !important;
      }

      /* Menu positioning - move to right side */
      .asw-menu {
        left: auto !important;
        right: 0 !important;
      }

      /* Profile button selected state color */
      .asw-profile-btn.asw-selected .asw-profile-toggle {
        background: #24563f !important;
      }

      /* Profile button hover and selected border color */
      .asw-profile-btn:hover,
      .asw-profile-btn.asw-selected {
        border-color: #24563f !important;
      }

      /* Menu header SVG icon color */
      .asw-menu-header svg {
        fill: #24563f !important;
      }

      /* Menu footer reset button */
      .asw-menu-reset-footer-btn {
        background: #24563f !important;
      }

      /* Alternative: override even more aggressively if needed */
      [class*="asw-menu-btn"] {
        left: auto !important;
        right: 20px !important;
        border: 3px solid white !important;
        outline: 5px solid #24563f !important;
        background: #24563f !important;
      }
    </style>
    <script>
      // Override accessibility widget colors after page load
      function updateAccessibilityWidgetColors() {
        // Button styling
        const btn = document.querySelector('.asw-menu-btn');
        if (btn) {
          btn.style.setProperty('background', 'linear-gradient(96deg, #24563f, #1a3f2f)', 'important');
          btn.style.setProperty('outline', '5px solid #24563f', 'important');
          btn.style.setProperty('left', 'auto', 'important');
          btn.style.setProperty('right', '20px', 'important');
        }

        // Menu positioning - move to right
        const menu = document.querySelector('.asw-menu');
        if (menu) {
          menu.style.setProperty('left', 'auto', 'important');
          menu.style.setProperty('right', '0', 'important');
        }

        // Menu header styling
        const header = document.querySelector('.asw-menu-header');
        if (header) {
          header.style.setProperty('background', 'linear-gradient(135deg, #24563f, #1a3f2f)', 'important');
        }

        // Card titles color
        const titles = document.querySelectorAll('.asw-card-title');
        titles.forEach(title => {
          title.style.setProperty('color', '#24563f', 'important');
        });

        // Profile button selected state
        const profileToggles = document.querySelectorAll('.asw-profile-btn.asw-selected .asw-profile-toggle');
        profileToggles.forEach(toggle => {
          toggle.style.setProperty('background', '#24563f', 'important');
        });

        // Profile button hover and selected border
        const profileBtns = document.querySelectorAll('.asw-profile-btn:hover, .asw-profile-btn.asw-selected');
        profileBtns.forEach(btn => {
          btn.style.setProperty('border-color', '#24563f', 'important');
        });

        // Menu header SVG icon color
        const headerSvgs = document.querySelectorAll('.asw-menu-header svg');
        headerSvgs.forEach(svg => {
          svg.style.setProperty('fill', '#24563f', 'important');
        });

        // Menu footer reset button
        const resetBtn = document.querySelector('.asw-menu-reset-footer-btn');
        if (resetBtn) {
          resetBtn.style.setProperty('background', '#24563f', 'important');
        }
      }

      function syncSiennaLanguage() {
        const lang = (document.documentElement.lang || 'en').toLowerCase();
        const plugin = window.SiennaPlugin;
        const menu = document.querySelector('.asw-menu');
        if (!plugin || typeof plugin.changeLanguage !== 'function' || !menu) return;
        plugin.changeLanguage(lang);
      }

      // Run on load and after a delay to ensure widget is loaded
      window.addEventListener('load', () => {
        updateAccessibilityWidgetColors();
        syncSiennaLanguage();

        const langObserver = new MutationObserver(() => syncSiennaLanguage());
        langObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['lang'] });
      });
      setTimeout(updateAccessibilityWidgetColors, 1000);
      setTimeout(updateAccessibilityWidgetColors, 3000);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/sienna-accessibility@latest/dist/sienna-accessibility.umd.js"
      data-asw-disableObserveLang="true"
      defer
    ></script>
  </body>
</html>
